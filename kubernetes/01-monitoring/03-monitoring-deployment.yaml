apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoriametrics
  template:
    metadata:
      labels:
        app: victoriametrics
    spec:
      serviceAccountName: victoriametrics
      nodeSelector:
        usage: infra
      tolerations:
        - key: "usage"
          operator: "Equal"
          value: "infra"
          effect: "NoSchedule"
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:latest
          args:
            - "-selfScrapeInterval=10s"
          ports:
            - containerPort: 8428
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"